            "山西": "山西 Shanxi",
            "陕西": "陕西 Shaanxi",
            "甘肃": "甘肃 Gansu",
            "青海": "青海 Qinghai",
            "江苏": "江苏 Jiangsu",
            "浙江": "浙江 Zhejiang",
            "安徽": "安徽 Anhui",
            "福建": "福建 Fujian",
            "江西": "江西 Jiangxi",
            "湖北": "湖北 Hubei",
            "湖南": "湖南 Hunan",
            "四川": "四川 Sichuan",
            "贵州": "贵州 Guizhou",
            "云南": "云南 Yunnan",
            "广东": "广东 Guangdong",
            "海南": "海南 Hainan"
        };

        data.forEach(item => {
            let parts = item.info.split(' (城市分类: ');
            let provCity = parts[0];
            let prov = provCity.replace(item.name, '');
            if (!prov) prov = item.name; 
            
            let catCoef = parts[1].split(', 系数: ');
            
            item._prov = prov;
            item._cat = catCoef[0];
            item._coef = parseFloat(item.value[2]);
            item._displayName = cityNameMap[item.name] || item.name;
            item._displayProv = provinceNameMap[item._prov] || item._prov;
        });

        data.sort((a, b) => {
            if (b._coef !== a._coef) {
                return b._coef - a._coef;
            }
            return a._prov.localeCompare(b._prov, 'zh-Hans-CN');
        });

        function getColor(v) {
            if (v >= 1.0) return '#ef4444'; 
            if (v >= 0.9) return '#f59e0b';
            if (v >= 0.85) return '#fbbf24';
            if (v >= 0.8) return '#3b82f6';
            return '#1e3a8a';
        }

        var tbody = document.getElementById('tableBody');
        data.forEach((item, index) => {
            let tr = document.createElement('tr');
            tr.id = 'row-' + index;
            let color = getColor(item._coef);
            tr.innerHTML = `
                <td><span class="color-dot" style="background:${color};"></span>${item._displayProv}</td>
                <td>${item._displayName}</td>
                <td>${item._cat}</td>
                <td>${item._coef.toFixed(2)}</td>
            `;
            
            tr.addEventListener('mouseenter', () => {
                document.querySelectorAll('.active-row').forEach(el => el.classList.remove('active-row'));
                tr.classList.add('active-row');
                
                myChart.dispatchAction({ type: 'downplay', seriesIndex: 0 });
                myChart.dispatchAction({ type: 'hideTip' });
                
                myChart.dispatchAction({ type: 'highlight', seriesIndex: 0, dataIndex: index });
                myChart.dispatchAction({ type: 'showTip', seriesIndex: 0, dataIndex: index });
            });
            
            tbody.appendChild(tr);
        });

        var option = {
            tooltip: {
                show: true,
                trigger: 'item',
                formatter: function (params) {
                    if (params.seriesType === 'scatter' && params.data) {
                        let info = params.data.info;

                        Object.keys(provinceNameMap).sort((a, b) => b.length - a.length).forEach(cn => {
                            const escaped = cn.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                            info = info.replace(new RegExp(escaped, 'g'), provinceNameMap[cn]);
                        });

                        Object.keys(cityNameMap).sort((a, b) => b.length - a.length).forEach(cn => {
                            const escaped = cn.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                            info = info.replace(new RegExp(escaped, 'g'), cityNameMap[cn]);
                        });

                        info = info.replace('城市分类', '城市分类 Category').replace('系数', '系数 Coefficient');
                        return info;
                    }
                }
            },
            visualMap: {
                min: 0.65, max: 1.00, precision: 2, calculable: true,
                inRange: { color: ['#1e3a8a', '#3b82f6', '#fbbf24', '#ef4444'] },
                textStyle: { color: '#333' },
                left: '2%', bottom: '5%' 
            },
            geo: {
                map: 'china',
                roam: true,
                tooltip: { show: false }, 
                label: { 
                    show: true, 
                    color: '#999',
                    formatter: function (params) {
                        return provinceNameMap[params.name] || params.name;
                    }
                }, 
                itemStyle: { areaColor: '#eaeaea', borderColor: '#ccc' },
                emphasis: { 
                    itemStyle: { areaColor: '#d4d4d4' },
                    label: { 
                        show: true, 
                        color: '#666',
                        formatter: function (params) {
                            return provinceNameMap[params.name] || params.name;
                        }
                    } 
                }
            },
            series: [
                {
                    name: '具体信息 Details',
                    type: 'scatter',  
                    coordinateSystem: 'geo',
                    data: data, 
                    symbolSize: 12,   
                    itemStyle: { opacity: 0.8 },
                    tooltip: {
                        show: true
                    }
                }
            ]
        };

        myChart.setOption(option);
        
        myChart.on('mouseover', function(e) {
            if (e.seriesType === 'scatter') {
                let row = document.getElementById('row-' + e.dataIndex);
                if (row) {
                    document.querySelectorAll('.active-row').forEach(el => el.classList.remove('active-row'));
                    row.classList.add('active-row');
                    row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }
        });
        
        myChart.on('mouseout', function(e) {
            if (e.seriesType === 'scatter') {
                let row = document.getElementById('row-' + e.dataIndex);
                if (row) row.classList.remove('active-row');
            }
        });

        window.addEventListener('resize', function() {
            myChart.resize();
        });
    </script>
</body>
</html>
